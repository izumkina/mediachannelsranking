<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор эффективности медиа каналов v9</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .title {
            font-size: 38px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-top: 10px;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.1);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #4b5563;
        }
        .select, .range-input {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
        }
        .select:focus, .range-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .mode-option {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            background: white;
            font-weight: 500;
        }
        .mode-option:hover {
            border-color: #a78bfa;
            background: #f9fafb;
        }
        .mode-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            color: #667eea;
            font-weight: 600;
        }
        .rating-type-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .rating-option {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rating-option:hover {
            border-color: #a78bfa;
        }
        .rating-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        }
        .rating-option input {
            accent-color: #667eea;
        }
        .channel-selector {
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px;
            background: #fafafa;
        }
        .channel-item {
            padding: 8px 12px;
            margin: 4px 0;
            background: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .channel-item:hover {
            background: #f3f4f6;
        }
        .channel-item input {
            margin-right: 10px;
            accent-color: #667eea;
        }
        .select-all-btn {
            padding: 8px 16px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .select-all-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        tr:hover {
            background: #f9fafb;
        }
        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .metric-card {
            background: linear-gradient(135deg, #f3f4f6, white);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }
        .metric-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        .metric-label {
            font-size: 14px;
            color: #6b7280;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #6b7280;
        }
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            margin-right: 20px;
            font-size: 14px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 8px;
        }
        .info-box {
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #4c1d95;
        }
        .factor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .factor-item {
            background: #f9fafb;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            font-size: 13px;
        }
        .factor-label {
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 5px;
        }
        .factor-value {
            color: #111827;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MediaCalculator = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [viewMode, setViewMode] = useState('channels');
            const [selectedChannels, setSelectedChannels] = useState([]);
            const [availableChannels, setAvailableChannels] = useState([]);
            const [displayCount, setDisplayCount] = useState(20);
            const [ratingType, setRatingType] = useState('brand');
            const [charts, setCharts] = useState({});

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                try {
                    setLoading(true);
                    console.log('Начинаю загрузку данных...');
                    
                    const response = await fetch('./calc_mts_v18_processed_v9_int.xlsx');
                    if (!response.ok) {
                        throw new Error(`Ошибка загрузки файла: ${response.status}`);
                    }
                    
                    const arrayBuffer = await response.arrayBuffer();
                    console.log(`Файл загружен: ${arrayBuffer.byteLength} байт`);
                    
                    const workbook = XLSX.read(arrayBuffer, {
                        cellStyles: true,
                        cellFormulas: true,
                        cellDates: true
                    });
                    
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
                    
                    // Маппинг колонок на индексы
                    const columnMapping = {
                        channel: 0,           // A
                        format: 1,            // B
                        duration: 2,          // C
                        formatStrength: 18,   // S
                        visualShare: 23,      // X
                        contactDuration: 32,  // AG
                        contactShare: 34,     // AI
                        momentClutter: 43,    // AR
                        trust: 52,            // BA
                        channelClutter: 55,   // BD
                        qualityIndex: 60,     // BI
                        relevanceIndex: 61,   // BJ
                        frequencyIndex: 62,   // BK
                        brandEfficiency: 67,  // BP
                        purchaseEfficiency: 68 // BQ
                    };

                    const processedData = rawData.slice(1).map((row, index) => ({
                        id: index,
                        channel: row[columnMapping.channel] || '',
                        format: row[columnMapping.format] || '',
                        duration: row[columnMapping.duration] || null,
                        // Входные факторы
                        formatStrength: parseFloat(row[columnMapping.formatStrength]) || 0,
                        visualShare: parseFloat(row[columnMapping.visualShare]) || 0,
                        contactDuration: parseFloat(row[columnMapping.contactDuration]) || 0,
                        contactShare: parseFloat(row[columnMapping.contactShare]) || 0,
                        momentClutter: parseFloat(row[columnMapping.momentClutter]) || 0,
                        trust: parseFloat(row[columnMapping.trust]) || 0,
                        channelClutter: parseFloat(row[columnMapping.channelClutter]) || 0,
                        // Промежуточные индексы
                        qualityIndex: parseFloat(row[columnMapping.qualityIndex]) || 0,
                        relevanceIndex: parseFloat(row[columnMapping.relevanceIndex]) || 0,
                        frequencyIndex: parseFloat(row[columnMapping.frequencyIndex]) || 0,
                        // Интегральные показатели
                        brandEfficiency: parseFloat(row[columnMapping.brandEfficiency]) || 0,
                        purchaseEfficiency: parseFloat(row[columnMapping.purchaseEfficiency]) || 0
                    })).filter(item => item.channel && item.channel !== '');

                    console.log(`Обработано записей: ${processedData.length}`);
                    
                    setData(processedData);
                    
                    const channels = [...new Set(processedData.map(item => item.channel))];
                    setAvailableChannels(channels);
                    setSelectedChannels(channels.slice(0, 10));
                    
                    setLoading(false);
                } catch (error) {
                    console.error('Ошибка загрузки:', error);
                    setError(error.message);
                    setLoading(false);
                }
            };

            const processedData = useMemo(() => {
                if (!data.length) return [];
                
                let filtered = data.filter(item => selectedChannels.includes(item.channel));
                
                const getRatingValue = (item) => {
                    return ratingType === 'brand' ? item.brandEfficiency : item.purchaseEfficiency;
                };
                
                if (viewMode === 'channels') {
                    // Группировка по каналам
                    const grouped = {};
                    filtered.forEach(item => {
                        if (!grouped[item.channel]) {
                            grouped[item.channel] = [];
                        }
                        grouped[item.channel].push(item);
                    });
                    
                    return Object.entries(grouped).map(([channel, items]) => {
                        const avgItem = {
                            name: channel,
                            channel: channel,
                            // Усредняем все показатели
                            formatStrength: items.reduce((sum, item) => sum + item.formatStrength, 0) / items.length,
                            visualShare: items.reduce((sum, item) => sum + item.visualShare, 0) / items.length,
                            contactDuration: items.reduce((sum, item) => sum + item.contactDuration, 0) / items.length,
                            contactShare: items.reduce((sum, item) => sum + item.contactShare, 0) / items.length,
                            momentClutter: items.reduce((sum, item) => sum + item.momentClutter, 0) / items.length,
                            trust: items.reduce((sum, item) => sum + item.trust, 0) / items.length,
                            channelClutter: items.reduce((sum, item) => sum + item.channelClutter, 0) / items.length,
                            qualityIndex: items.reduce((sum, item) => sum + item.qualityIndex, 0) / items.length,
                            relevanceIndex: items.reduce((sum, item) => sum + item.relevanceIndex, 0) / items.length,
                            frequencyIndex: items.reduce((sum, item) => sum + item.frequencyIndex, 0) / items.length,
                            brandEfficiency: items.reduce((sum, item) => sum + item.brandEfficiency, 0) / items.length,
                            purchaseEfficiency: items.reduce((sum, item) => sum + item.purchaseEfficiency, 0) / items.length
                        };
                        avgItem.ratingValue = getRatingValue(avgItem);
                        return avgItem;
                    }).sort((a, b) => b.ratingValue - a.ratingValue).slice(0, displayCount);
                    
                } else if (viewMode === 'channel-format') {
                    // Группировка по каналу и формату
                    const grouped = {};
                    filtered.forEach(item => {
                        const key = `${item.channel} - ${item.format}`;
                        if (!grouped[key]) {
                            grouped[key] = [];
                        }
                        grouped[key].push(item);
                    });
                    
                    return Object.entries(grouped).map(([key, items]) => {
                        const avgItem = {
                            name: key,
                            channel: items[0].channel,
                            format: items[0].format,
                            formatStrength: items.reduce((sum, item) => sum + item.formatStrength, 0) / items.length,
                            visualShare: items.reduce((sum, item) => sum + item.visualShare, 0) / items.length,
                            contactDuration: items.reduce((sum, item) => sum + item.contactDuration, 0) / items.length,
                            contactShare: items.reduce((sum, item) => sum + item.contactShare, 0) / items.length,
                            momentClutter: items.reduce((sum, item) => sum + item.momentClutter, 0) / items.length,
                            trust: items.reduce((sum, item) => sum + item.trust, 0) / items.length,
                            channelClutter: items.reduce((sum, item) => sum + item.channelClutter, 0) / items.length,
                            qualityIndex: items.reduce((sum, item) => sum + item.qualityIndex, 0) / items.length,
                            relevanceIndex: items.reduce((sum, item) => sum + item.relevanceIndex, 0) / items.length,
                            frequencyIndex: items.reduce((sum, item) => sum + item.frequencyIndex, 0) / items.length,
                            brandEfficiency: items.reduce((sum, item) => sum + item.brandEfficiency, 0) / items.length,
                            purchaseEfficiency: items.reduce((sum, item) => sum + item.purchaseEfficiency, 0) / items.length
                        };
                        avgItem.ratingValue = getRatingValue(avgItem);
                        return avgItem;
                    }).sort((a, b) => b.ratingValue - a.ratingValue).slice(0, displayCount);
                    
                } else {
                    // Канал + Формат + Длительность
                    return filtered.map(item => ({
                        ...item,
                        name: `${item.channel} - ${item.format}${item.duration ? ` (${item.duration}с)` : ''}`,
                        ratingValue: getRatingValue(item)
                    })).sort((a, b) => b.ratingValue - a.ratingValue).slice(0, displayCount);
                }
            }, [data, viewMode, selectedChannels, displayCount, ratingType]);

            const updateBarChart = () => {
                const ctx = document.getElementById('barChart');
                if (!ctx) return;
                
                if (charts.bar) {
                    charts.bar.destroy();
                }
                
                const newChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: processedData.map(item => item.name),
                        datasets: [
                            {
                                label: ratingType === 'brand' ? 'Эффективность для бренд-метрик' : 'Эффективность для бизнес-показателей',
                                data: processedData.map(item => item.ratingValue),
                                backgroundColor: 'rgba(102, 126, 234, 0.6)',
                                borderColor: 'rgba(102, 126, 234, 1)',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top'
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.dataset.label}: ${context.parsed.y.toFixed(4)}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: 'Значение индекса'
                                }
                            },
                            x: {
                                ticks: {
                                    autoSkip: false,
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        }
                    }
                });
                
                setCharts(prev => ({...prev, bar: newChart}));
            };

            const updateRadarChart = () => {
                const ctx = document.getElementById('radarChart');
                if (!ctx) return;
                
                if (charts.radar) {
                    charts.radar.destroy();
                }
                
                const top5 = processedData.slice(0, 5);
                
                const newChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: [
                            'Сила воздействия',
                            'Доля в поле зрения',
                            'Длительность контакта',
                            'Доля контактов',
                            'Доверие',
                            'Индекс качества',
                            'Индекс релевантности'
                        ],
                        datasets: top5.map((item, index) => ({
                            label: item.name,
                            data: [
                                item.formatStrength,
                                item.visualShare,
                                item.contactDuration,
                                item.contactShare,
                                item.trust,
                                item.qualityIndex,
                                item.relevanceIndex
                            ],
                            borderColor: `hsla(${index * 72}, 70%, 50%, 1)`,
                            backgroundColor: `hsla(${index * 72}, 70%, 50%, 0.2)`,
                            borderWidth: 2
                        }))
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        },
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 1
                            }
                        }
                    }
                });
                
                setCharts(prev => ({...prev, radar: newChart}));
            };

            const updateLineChart = () => {
                const ctx = document.getElementById('lineChart');
                if (!ctx) return;
                
                if (charts.line) {
                    charts.line.destroy();
                }
                
                const newChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: processedData.map(item => item.name),
                        datasets: [
                            {
                                label: 'Индекс качества',
                                data: processedData.map(item => item.qualityIndex),
                                borderColor: 'rgba(102, 126, 234, 1)',
                                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                borderWidth: 2,
                                tension: 0.4
                            },
                            {
                                label: 'Индекс релевантности',
                                data: processedData.map(item => item.relevanceIndex),
                                borderColor: 'rgba(118, 75, 162, 1)',
                                backgroundColor: 'rgba(118, 75, 162, 0.1)',
                                borderWidth: 2,
                                tension: 0.4
                            },
                            {
                                label: 'Индекс частоты',
                                data: processedData.map(item => item.frequencyIndex),
                                borderColor: 'rgba(244, 114, 182, 1)',
                                backgroundColor: 'rgba(244, 114, 182, 0.1)',
                                borderWidth: 2,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: 'Значение индекса'
                                }
                            },
                            x: {
                                ticks: {
                                    autoSkip: false,
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        }
                    }
                });
                
                setCharts(prev => ({...prev, line: newChart}));
            };

            const updateScatterChart = () => {
                const ctx = document.getElementById('scatterChart');
                if (!ctx) return;
                
                if (charts.scatter) {
                    charts.scatter.destroy();
                }
                
                const newChart = new Chart(ctx, {
                    type: 'scatter',
                    data: {
                        datasets: [{
                            label: 'Каналы',
                            data: processedData.map(item => ({
                                x: item.qualityIndex,
                                y: item.ratingValue,
                                label: item.name
                            })),
                            backgroundColor: processedData.map((_, index) => 
                                `hsla(${(index * 360) / processedData.length}, 70%, 50%, 0.6)`
                            ),
                            borderColor: processedData.map((_, index) => 
                                `hsla(${(index * 360) / processedData.length}, 70%, 50%, 1)`
                            ),
                            borderWidth: 2,
                            pointRadius: 8,
                            pointHoverRadius: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const point = context.raw;
                                        return [
                                            point.label,
                                            `Индекс качества: ${point.x.toFixed(4)}`,
                                            `${ratingType === 'brand' ? 'Бренд-эффективность' : 'Бизнес-эффективность'}: ${point.y.toFixed(4)}`
                                        ];
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: 'Индекс качества'
                                },
                                beginAtZero: true
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: ratingType === 'brand' ? 'Эффективность для бренд-метрик' : 'Эффективность для бизнес-показателей'
                                },
                                beginAtZero: true
                            }
                        }
                    }
                });
                
                setCharts(prev => ({...prev, scatter: newChart}));
            };

            useEffect(() => {
                if (processedData.length > 0) {
                    setTimeout(() => {
                        updateBarChart();
                        updateRadarChart();
                        updateLineChart();
                        updateScatterChart();
                    }, 100);
                }
            }, [processedData]);

            const handleChannelToggle = (channel) => {
                setSelectedChannels(prev => 
                    prev.includes(channel) 
                        ? prev.filter(c => c !== channel)
                        : [...prev, channel]
                );
            };

            const handleSelectAll = () => {
                if (selectedChannels.length === availableChannels.length) {
                    setSelectedChannels([]);
                } else {
                    setSelectedChannels([...availableChannels]);
                }
            };

            if (loading) {
                return (
                    <div className="container">
                        <div className="loading">
                            <div>⏳ Загрузка данных...</div>
                            <div style={{fontSize: '14px', marginTop: '10px', color: '#9ca3af'}}>
                                Загружается файл calc_mts_v18_processed_v9_int.xlsx
                            </div>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="container">
                        <div className="error">
                            <strong>Ошибка загрузки данных:</strong><br/>
                            {error}<br/><br/>
                            Убедитесь, что файл calc_mts_v18_processed_v9_int.xlsx находится в той же папке, что и HTML файл.
                        </div>
                    </div>
                );
            }

            const topMetrics = processedData.slice(0, 5);
            const avgQuality = processedData.reduce((sum, item) => sum + item.qualityIndex, 0) / processedData.length || 0;
            const avgRelevance = processedData.reduce((sum, item) => sum + item.relevanceIndex, 0) / processedData.length || 0;
            const avgFrequency = processedData.reduce((sum, item) => sum + item.frequencyIndex, 0) / processedData.length || 0;
            const avgBrand = processedData.reduce((sum, item) => sum + item.brandEfficiency, 0) / processedData.length || 0;
            const avgPurchase = processedData.reduce((sum, item) => sum + item.purchaseEfficiency, 0) / processedData.length || 0;

            return (
                <div className="container">
                    <div className="header">
                        <h1 className="title">📊 Калькулятор эффективности медиа каналов</h1>
                        <p className="subtitle">Анализ качества, релевантности и потенциала медиа размещений</p>
                    </div>

                    <div className="info-box">
                        <strong>ℹ️ Информация о данных:</strong><br/>
                        Загружено {data.length} записей из {availableChannels.length} медиа каналов.<br/>
                        Данные включают 7 входных факторов, 3 промежуточных индекса и 2 интегральных показателя эффективности.
                    </div>

                    <div className="card">
                        <div className="card-title">⚙️ Настройки отображения</div>
                        
                        <div className="controls">
                            <div className="control-group">
                                <label className="label">Режим отображения</label>
                                <div className="mode-selector">
                                    <div 
                                        className={`mode-option ${viewMode === 'channels' ? 'selected' : ''}`}
                                        onClick={() => setViewMode('channels')}
                                    >
                                        📺 Только каналы
                                    </div>
                                    <div 
                                        className={`mode-option ${viewMode === 'channel-format' ? 'selected' : ''}`}
                                        onClick={() => setViewMode('channel-format')}
                                    >
                                        🎨 Канал + Формат
                                    </div>
                                    <div 
                                        className={`mode-option ${viewMode === 'full' ? 'selected' : ''}`}
                                        onClick={() => setViewMode('full')}
                                    >
                                        ⏱️ Полная детализация
                                    </div>
                                </div>
                            </div>

                            <div className="control-group">
                                <label className="label">Тип эффективности</label>
                                <div className="rating-type-selector">
                                    <label className={`rating-option ${ratingType === 'brand' ? 'selected' : ''}`}>
                                        <input
                                            type="radio"
                                            value="brand"
                                            checked={ratingType === 'brand'}
                                            onChange={(e) => setRatingType(e.target.value)}
                                        />
                                        <div>
                                            <strong>🎯 Бренд-метрики</strong><br/>
                                            <small>Узнаваемость, лояльность</small>
                                        </div>
                                    </label>
                                    <label className={`rating-option ${ratingType === 'purchase' ? 'selected' : ''}`}>
                                        <input
                                            type="radio"
                                            value="purchase"
                                            checked={ratingType === 'purchase'}
                                            onChange={(e) => setRatingType(e.target.value)}
                                        />
                                        <div>
                                            <strong>💰 Бизнес-показатели</strong><br/>
                                            <small>Продажи, конверсии</small>
                                        </div>
                                    </label>
                                </div>
                            </div>

                            <div className="control-group">
                                <label className="label">Количество элементов: {displayCount}</label>
                                <input
                                    type="range"
                                    className="range-input"
                                    min="5"
                                    max="50"
                                    value={displayCount}
                                    onChange={(e) => setDisplayCount(Number(e.target.value))}
                                />
                            </div>
                        </div>

                        <div className="control-group">
                            <label className="label">Выбор каналов для анализа</label>
                            <button className="select-all-btn" onClick={handleSelectAll}>
                                {selectedChannels.length === availableChannels.length ? '✗ Снять все' : '✓ Выбрать все'}
                            </button>
                            <div className="channel-selector">
                                {availableChannels.map(channel => (
                                    <label key={channel} className="channel-item">
                                        <input
                                            type="checkbox"
                                            checked={selectedChannels.includes(channel)}
                                            onChange={() => handleChannelToggle(channel)}
                                        />
                                        {channel}
                                    </label>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">📈 Сводные метрики</div>
                        <div className="metrics-grid">
                            <div className="metric-card">
                                <div className="metric-value">{avgQuality.toFixed(3)}</div>
                                <div className="metric-label">Средний индекс качества</div>
                            </div>
                            <div className="metric-card">
                                <div className="metric-value">{avgRelevance.toFixed(3)}</div>
                                <div className="metric-label">Средний индекс релевантности</div>
                            </div>
                            <div className="metric-card">
                                <div className="metric-value">{avgFrequency.toFixed(3)}</div>
                                <div className="metric-label">Средний индекс частоты</div>
                            </div>
                            <div className="metric-card">
                                <div className="metric-value">{avgBrand.toFixed(3)}</div>
                                <div className="metric-label">Средняя бренд-эффективность</div>
                            </div>
                            <div className="metric-card">
                                <div className="metric-value">{avgPurchase.toFixed(3)}</div>
                                <div className="metric-label">Средняя бизнес-эффективность</div>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">📊 Интегральный рейтинг</div>
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Ранг</th>
                                        <th>Название</th>
                                        <th>Индекс качества</th>
                                        <th>Индекс релевантности</th>
                                        <th>Индекс частоты</th>
                                        <th>Бренд-эффективность</th>
                                        <th>Бизнес-эффективность</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {processedData.map((item, index) => (
                                        <tr key={index}>
                                            <td>{index + 1}</td>
                                            <td><strong>{item.name}</strong></td>
                                            <td>{item.qualityIndex.toFixed(4)}</td>
                                            <td>{item.relevanceIndex.toFixed(4)}</td>
                                            <td>{item.frequencyIndex.toFixed(4)}</td>
                                            <td style={{
                                                background: ratingType === 'brand' ? 'linear-gradient(90deg, rgba(102,126,234,0.2), transparent)' : '',
                                                fontWeight: ratingType === 'brand' ? 'bold' : 'normal'
                                            }}>{item.brandEfficiency.toFixed(4)}</td>
                                            <td style={{
                                                background: ratingType === 'purchase' ? 'linear-gradient(90deg, rgba(118,75,162,0.2), transparent)' : '',
                                                fontWeight: ratingType === 'purchase' ? 'bold' : 'normal'
                                            }}>{item.purchaseEfficiency.toFixed(4)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <div className="card-title">📊 Рейтинг эффективности</div>
                            <div className="chart-container">
                                <canvas id="barChart"></canvas>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-title">🎯 Сравнение топ-5 по факторам</div>
                            <div className="chart-container">
                                <canvas id="radarChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <div className="card-title">📈 Динамика индексов</div>
                            <div className="chart-container">
                                <canvas id="lineChart"></canvas>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-title">🔍 Матрица качество-эффективность</div>
                            <div className="chart-container">
                                <canvas id="scatterChart"></canvas>
                            </div>
                        </div>
                    </div>

                    {topMetrics.length > 0 && (
                        <div className="card">
                            <div className="card-title">🏆 Топ-5 каналов: детальный анализ факторов</div>
                            {topMetrics.map((item, index) => (
                                <div key={index} style={{marginBottom: '20px', padding: '15px', background: '#f9fafb', borderRadius: '8px'}}>
                                    <h4 style={{marginBottom: '10px', color: '#667eea'}}>
                                        #{index + 1} {item.name}
                                    </h4>
                                    <div className="factor-grid">
                                        <div className="factor-item">
                                            <div className="factor-label">Сила воздействия</div>
                                            <div className="factor-value">{item.formatStrength.toFixed(3)}</div>
                                        </div>
                                        <div className="factor-item">
                                            <div className="factor-label">Доля в поле зрения</div>
                                            <div className="factor-value">{item.visualShare.toFixed(3)}</div>
                                        </div>
                                        <div className="factor-item">
                                            <div className="factor-label">Длительность контакта</div>
                                            <div className="factor-value">{item.contactDuration.toFixed(3)}</div>
                                        </div>
                                        <div className="factor-item">
                                            <div className="factor-label">Доля контактов</div>
                                            <div className="factor-value">{item.contactShare.toFixed(3)}</div>
                                        </div>
                                        <div className="factor-item">
                                            <div className="factor-label">Доверие</div>
                                            <div className="factor-value">{item.trust.toFixed(3)}</div>
                                        </div>
                                        <div className="factor-item">
                                            <div className="factor-label">Клаттер момента</div>
                                            <div className="factor-value">{item.momentClutter.toFixed(3)}</div>
                                        </div>
                                        <div className="factor-item">
                                            <div className="factor-label">Клаттер канала</div>
                                            <div className="factor-value">{item.channelClutter.toFixed(3)}</div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<MediaCalculator />, document.getElementById('root'));
    </script>
</body>
</html>
